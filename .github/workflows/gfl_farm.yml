name: GFL Auto Farm Workflow

on:
  workflow_dispatch:
    inputs:
      mission_type:
        description: 'Select Mission Type to Farm'
        required: true
        default: 'f2p'
        type: choice
        options:
          - f2p
          - pick_coin

jobs:
  farm:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gflzirc requests

      - name: Run GFL Agent
        env:
          GFL_CONFIG: ${{ secrets.GFL_CONFIG }}
          GFL_SIGN_KEY: ${{ secrets.GFL_SIGN_KEY }}
          GFL_MISSION_TYPE: ${{ github.event.inputs.mission_type }}
          # Force Python to flush stdout immediately for real-time GHA logging
          PYTHONUNBUFFERED: "1"
        run: |
          python src/gha/agent.py

      - name: Check for Respawn Flag
        id: check_respawn
        shell: pwsh
        run: |
          if (Test-Path "respawn.flag") {
            echo "RESPAWN_NEEDED=true" >> $env:GITHUB_ENV
            Write-Host "Respawn flag detected. Triggering next job..."
          } else {
            echo "RESPAWN_NEEDED=false" >> $env:GITHUB_ENV
            Write-Host "No respawn flag. Job completed or failed fatally."
          }

      - name: Trigger Next Workflow
        if: env.RESPAWN_NEEDED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        shell: pwsh
        run: |
          gh workflow run "GFL Auto Farm Workflow" -f mission_type="${{ github.event.inputs.mission_type }}"
          Write-Host "Next job triggered successfully."