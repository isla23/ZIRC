name: Build and Release

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - "src/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cpp:
    name: Build Native DLL
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with: 
          submodules: true
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install SCons
        run: pip install scons
        
      # Use official action to set up MSVC environment variables implicitly
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          
      - name: Execute Unified Build (C++)
        shell: pwsh
        run: |
          cd src
          # SCons will be available, MSVC is configured, CI runs Fallback offset generation.
          .\build.ps1 -Cpp -Mode release
          
      - name: Package Output (ZIP)
        shell: pwsh
        run: |
          $DllPath = "src\build\cpp\version.dll"
          
          # 1. Verification: Fail fast if DLL is missing to prevent silent failures
          if (-not (Test-Path $DllPath)) {
              Write-Error "[-] Build failed silently: $DllPath was not generated!"
              exit 1
          }
          Write-Host "[+] Found generated DLL: $DllPath"
          
          # 2. Dynamic naming based on trigger event
          if ("${{ github.ref_type }}" -eq "tag") {
              $ZipName = "ZIRC-Hook-Release-${{ github.ref_name }}.zip"
          } else {
              $ShortSha = "${{ github.sha }}".Substring(0, 7)
              $ZipName = "ZIRC-Hook-Build-$ShortSha.zip"
          }
          
          # 3. Compress directly to ZIP
          Compress-Archive -Path $DllPath -DestinationPath $ZipName
          Write-Host "[+] Created archive: $ZipName"
          
          # 4. Pass the ZIP name to the next step via environment variable
          echo "ZIP_NAME=$ZipName" >> $env:GITHUB_ENV
          
      - name: Upload Artifact to Action Summary
        uses: actions/upload-artifact@v4
        with:
          name: ZIRC-Artifacts
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error # 强制要求文件必须存在，否则任务变红失败
          
  release:
    name: Create GitHub Release
    needs: build-cpp
    # Only run on tags (e.g., v1.0.0)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ZIRC-Artifacts
          path: release_assets
          
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          # Directly upload the pre-packaged zip from build job
          files: release_assets/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}